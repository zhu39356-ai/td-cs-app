<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f7f8fa" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="台达客服部" />
<title>台达客服部｜内部协作台</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="application-name" content="台达客服部" />
<meta name="apple-mobile-web-app-title" content="台达客服部" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#f4f6f8" />
<meta name="background-color" content="#f4f6f8" />

<style>
:root {
  --bg:#f4f6f8;
  --surface:#ffffff;
  --line:#e6eaf0;
  --line2:#eef1f5;
  --text:#162033;
  --muted:#7d8a99;
  --soft:#a0abb8;
  --accent:#ee5a50;
  --accent-soft:#fff1ef;
  --green:#36a279;
  --green-soft:#edf9f4;
  --blue:#557eaf;
  --blue-soft:#edf3fb;
  --orange:#f5a14a;
  --orange-soft:#fff5e9;
  --purple:#7d72d9;
  --purple-soft:#f1efff;
  --shadow:0 8px 24px rgba(18,32,53,.06);
  --shadow2:0 2px 12px rgba(18,32,53,.05);
  --r:16px;
  --r2:12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
.app{
  width:100%;
  height:100dvh;
  display:flex;
  justify-content:center;
  background:linear-gradient(120deg,#f7f8fa 0%,#edf1f5 100%);
}
.shell{
  width:min(100%,1080px);
  height:100dvh;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}
@media(min-width:760px){
  .shell{height:calc(100dvh - 36px);margin:18px;border-radius:24px;box-shadow:0 22px 60px rgba(20,31,48,.13);}
}
.header{
  height:98px;
  background:rgba(255,255,255,.92);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px 20px 16px;
  position:relative;
  z-index:5;
}
.brand-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px}
.header-actions{display:flex;gap:10px}
.icon-btn{
  width:36px;height:36px;border:1px solid var(--line);border-radius:12px;
  background:#fff;box-shadow:var(--shadow2);display:flex;align-items:center;justify-content:center;color:#283448;
}
.icon-btn svg{width:19px;height:19px;stroke-width:2}
.content{
  height:calc(100dvh - 98px - 72px - var(--safe-bottom));
  overflow:auto;
  padding:20px 16px 24px;
  scroll-behavior:smooth;
}
@media(min-width:760px){
 .content{height:calc(100% - 98px - 60px);padding:22px}
}
.content::-webkit-scrollbar{width:8px}
.content::-webkit-scrollbar-thumb{background:#cfd6df;border-radius:20px}
.page{display:none}
.page.active{display:block;animation:rise .18s ease both}
@keyframes rise{from{opacity:.6;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin:0 0 10px;
}
.section-title{font-size:16px;font-weight:650;letter-spacing:-.01em}
.section-meta{font-size:12px;color:var(--muted)}
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r);
  box-shadow:var(--shadow2);
}
.metrics{
  display:grid;grid-template-columns:repeat(3,1fr);
  overflow:hidden;
}
.metric{padding:16px 14px;border-right:1px solid var(--line)}
.metric:last-child{border-right:0}
.metric-label{font-size:12px;color:#667487;margin-bottom:8px;white-space:nowrap}
.metric-value{font-size:28px;color:var(--accent);font-weight:700;letter-spacing:-.04em}
.metric-unit{font-size:14px;color:#7b8898;font-weight:400;margin-left:2px}
.grid-3{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.grid-3{grid-template-columns:1fr 1fr 1fr}}
.shift-panel{overflow:hidden;margin-bottom:22px}
.shift-row{
  display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;
  align-items:center;padding:16px 16px;border-bottom:1px solid var(--line2);
}
.shift-row:last-child{border-bottom:0}
.shift-icon{
  width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;
}
.shift-icon svg{width:23px;height:23px;stroke-width:1.9}
.shift-name{font-size:16px;font-weight:650}
.shift-sub{font-size:12px;color:var(--muted);margin-top:4px}
.shift-count{font-size:18px;font-weight:650;color:var(--text);white-space:nowrap}
.shift-count b{font-size:24px;color:var(--accent);font-weight:700}
.bar{width:86px;height:5px;background:#e9edf2;border-radius:99px;overflow:hidden}
.bar span{display:block;height:100%;background:var(--accent);border-radius:99px}
.chev{color:#98a3b1;font-size:24px;line-height:1}
.roster-card{overflow:hidden;margin-bottom:22px}
.roster-block{padding:14px 14px 16px;border-bottom:1px solid var(--line2);position:relative}
.roster-block:last-child{border-bottom:0}
.roster-block:before{content:"";position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:3px}
.roster-block.morning:before{background:var(--accent)}
.roster-block.mid:before{background:var(--orange)}
.roster-block.night:before{background:var(--purple)}
.roster-top{display:flex;align-items:center;justify-content:space-between;margin-left:14px;margin-bottom:12px}
.roster-title{display:flex;align-items:center;gap:8px;font-weight:650}
.roster-total{font-size:12px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-left:14px}
.person-chip{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--line);background:#fff;border-radius:11px;
  padding:6px 9px;font-size:13px;color:#263247;min-height:32px;
}
.status{
  display:inline-flex;align-items:center;border-radius:99px;padding:2px 7px;font-size:11px;line-height:1;
  border:1px solid transparent;
}
.status.work{color:var(--green);background:var(--green-soft);border-color:#cdeee2}
.status.off{color:#8793a3;background:#f5f7f9;border-color:#e1e6ed}
.notice-card{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.notice-icon{
  width:34px;height:34px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0
}
.notice-title{font-size:14px;font-weight:650}
.notice-text{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}
.tabbar{
  position:absolute;left:0;right:0;bottom:0;height:calc(72px + var(--safe-bottom));
  background:rgba(255,255,255,.95);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);
  padding:6px 8px calc(6px + var(--safe-bottom));z-index:10;
}
@media(min-width:760px){.tabbar{height:60px;padding:4px 12px}}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:#8b96a5;font-size:11px;border-radius:14px;
}
.tab svg{width:21px;height:21px;stroke-width:1.8}
.tab.active{color:var(--accent);background:var(--accent-soft)}
.ai-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.ai-stat{padding:16px;border-radius:15px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow2)}
.ai-stat small{color:var(--muted);font-size:12px}
.ai-stat strong{display:block;margin-top:8px;font-size:28px;letter-spacing:-.04em}
.ai-chart-card{padding:18px;margin-bottom:20px}
.ai-chart-wrap{display:grid;grid-template-columns:1fr;gap:18px;align-items:center}
@media(min-width:760px){.ai-chart-wrap{grid-template-columns:260px 1fr}}
.donut{width:220px;height:220px;margin:auto;position:relative}
.donut svg{width:100%;height:100%}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.donut-center b{font-size:28px}
.donut-center span{font-size:12px;color:var(--muted);margin-top:4px}
.legend{display:grid;gap:10px}
.legend-row{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;font-size:13px;color:#314057}
.dot{width:8px;height:8px;border-radius:50%}
.legend-row em{font-style:normal;color:#8290a1}
.analysis-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:22px}
@media(min-width:760px){.analysis-grid{grid-template-columns:repeat(3,1fr)}}
.analysis-card{padding:14px 14px;border-radius:15px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow2)}
.analysis-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.analysis-main{font-size:14px;font-weight:650;line-height:1.4}
.analysis-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-top:8px}
.result-list{overflow:hidden;margin-bottom:20px}
.result-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:15px 16px;border-bottom:1px solid var(--line2)}
.result-row:last-child{border-bottom:0}
.num{
  width:32px;height:32px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-weight:650;
}
.result-title{font-size:14px;font-weight:650}
.result-desc{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px}
.segment{
  display:flex;gap:8px;overflow:auto;margin-bottom:14px;padding-bottom:2px;
}
.seg-btn{
  white-space:nowrap;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:#667487;font-size:13px
}
.seg-btn.active{border-color:#f3b6ae;background:var(--accent-soft);color:var(--accent);font-weight:650}
.att-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.att-grid{grid-template-columns:repeat(3,1fr)}}
.att-card{padding:16px}
.att-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.att-title{font-size:16px;font-weight:650}
.att-count{font-size:12px;color:var(--muted)}
.att-group-title{font-size:12px;color:var(--muted);margin:12px 0 8px}
.person-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line2)}
.person-row:last-child{border-bottom:0}
.avatar{width:28px;height:28px;border-radius:10px;background:#f0f3f7;color:#667487;display:flex;align-items:center;justify-content:center;font-weight:650;font-size:12px}
.person-left{display:flex;align-items:center;gap:9px}
.person-name{font-size:13px}
.cal-layout{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:900px){.cal-layout{grid-template-columns:minmax(440px,1.05fr) minmax(340px,.95fr)}}
.cal-card{padding:14px}
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-title{font-weight:700;font-size:17px}
.cal-nav{display:flex;gap:10px}
.small-btn{width:32px;height:32px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;color:#57657a}
.week-row,.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.week{font-size:12px;color:#718093;text-align:center;padding:8px 0}
.day{min-height:58px;border:1px solid var(--line2);background:#fff;border-radius:10px;padding:7px;text-align:right;font-size:12px;position:relative}
@media(min-width:760px){.day{min-height:62px}}
.day.other{opacity:.32}
.day.has:after{content:"";position:absolute;bottom:8px;left:50%;width:4px;height:4px;background:var(--accent);border-radius:50%;transform:translateX(-50%)}
.day.selected{border-color:#f2a79f;background:var(--accent-soft);color:var(--accent);font-weight:700}
.side-card{padding:14px;align-self:start}
.side-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.filter-link{font-size:12px;color:#64748b}
.search-input{
  width:100%;border:1px solid var(--line);border-radius:12px;height:42px;padding:0 12px;font:inherit;font-size:14px;outline:none;background:#fff;
}
.quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.quick button{padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#667487;font-size:12px}
.modal-mask{
  position:absolute;inset:0;background:rgba(20,30,44,.28);z-index:50;display:none;align-items:flex-end;justify-content:center;
}
.modal-mask.open{display:flex}
.modal{
  width:100%;max-width:560px;background:#fff;border-radius:22px 22px 0 0;padding:16px 16px calc(18px + var(--safe-bottom));box-shadow:0 -14px 40px rgba(15,23,42,.18);
}
@media(min-width:760px){.modal-mask{align-items:center}.modal{border-radius:22px;padding:18px;width:460px}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:17px;font-weight:700}
.close{width:30px;height:30px;border-radius:50%;background:#f1f3f6;color:#738094}
.search-results{margin-top:14px;display:grid;gap:8px;max-height:260px;overflow:auto}
.search-item{padding:10px;border:1px solid var(--line);border-radius:12px;background:#fff}
.search-item b{font-size:13px}
.search-item p{font-size:12px;color:var(--muted);margin-top:4px}
.toast{
  position:absolute;left:50%;bottom:calc(84px + var(--safe-bottom));transform:translateX(-50%) translateY(10px);
  background:#1f2937;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:.18s
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer-note{font-size:12px;color:var(--muted);line-height:1.7;padding:12px 0 4px}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <header class="header">
      <div>
        <div class="brand-title">台达客服部</div>
        <div class="brand-sub">内部协作台</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="searchBtn" aria-label="搜寻">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        </button>
        <button class="icon-btn" id="notifyBtn" aria-label="通知">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <section class="page active" id="page-home"></section>
      <section class="page" id="page-ai"></section>
      <section class="page" id="page-attendance"></section>
      <section class="page" id="page-calendar"></section>
      <section class="page" id="page-me"></section>
    </main>

    <nav class="tabbar">
      <button class="tab active" data-page="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z"/></svg><span>首页</span></button>
      <button class="tab" data-page="ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19V5"/><path d="M8 19v-6"/><path d="M12 19V9"/><path d="M16 19v-9"/><path d="M20 19V7"/></svg><span>AI产出</span></button>
      <button class="tab" data-page="attendance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg><span>出缺勤</span></button>
      <button class="tab" data-page="calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg><span>班表</span></button>
      <button class="tab" data-page="me"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.6-4 5-6 8-6s6.4 2 8 6"/></svg><span>我的</span></button>
    </nav>

    <div class="modal-mask" id="searchModal">
      <div class="modal">
        <div class="modal-head"><div class="modal-title">搜寻</div><button class="close" data-close>×</button></div>
        <input class="search-input" id="searchInput" placeholder="输入人名、日期或功能，例如 Minnie、5/20、日报" />
        <div class="quick">
          <button data-q="今日出缺勤">今日出缺勤</button><button data-q="AI产出">AI产出</button><button data-q="晚班名单">晚班名单</button><button data-q="日报工具">日报工具</button>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <div class="modal-mask" id="notifyModal">
      <div class="modal">
        <div class="modal-head"><div class="modal-title">通知中心</div><button class="close" data-close>×</button></div>
        <div class="search-results" id="notifyList"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

function currentPageDate(){
  return activePage === "calendar" ? calendarSelectedDate : todayDate;
}

function localISODate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDate(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
function zhDate(iso){
  const d=parseDate(iso);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function zhDateWeek(iso){
  const w="日一二三四五六"[parseDate(iso).getDay()];
  return `${zhDate(iso)}（${w}）`;
}
function nowTime(){
  const d=new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function selectedSchedule(date = currentPageDate()){ return APP_DATA.schedule[date]; }
function countDay(data){
  if(!data) return {work:0,off:0,total:0};
  let work=0, off=0, total=0;
  shiftOrder.forEach(s=> (data[s]||[]).forEach(p=>{ total++; if(p.status==='上班') work++; else off++; }));
  return {work,off,total};
}
function shiftStats(data, shift){
  const arr = data?.[shift] || [];
  const work = arr.filter(p=>p.status==="上班").length;
  return {work,total:arr.length,off:arr.length-work};
}
function statusClass(s){ return s==="上班" ? "work" : "off"; }
function shortStatus(p){ return p.status==="上班" ? "上班" : p.raw && p.raw!=="无资料" ? p.raw : "休"; }
function iconSun(type){
 if(type==="晚班") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 15.5A7 7 0 1 1 8.5 4 8 8 0 0 0 20 15.5z"/><path d="M18 4v4M16 6h4"/></svg>';

}

function renderShiftPanel(data){

  const [bg,fg]=shiftIconColor[sh];
  return `<div class="shift-row" data-goto-att="${sh}">
    <div class="shift-icon" style="background:${bg};color:${fg}">${iconSun(sh)}</div>

function donutSVG(){
 const total = APP_DATA.ai.total, cx=110, cy=110, R=92, r=58, gap=0.018;
 let a=-Math.PI/2, paths='';
 APP_DATA.ai.directions.forEach(item=>{
  const span = item.count/total*Math.PI*2-gap;
  const a1=a, a2=a+span;
  const large = span>Math.PI?1:0;
  const x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
  const x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2);
  const ix1=cx+r*Math.cos(a2), iy1=cy+r*Math.sin(a2);
  const ix2=cx+r*Math.cos(a1), iy2=cy+r*Math.sin(a1);
  paths += `<path d="M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${ix1},${iy1} A${r},${r} 0 ${large} 0 ${ix2},${iy2} Z" fill="${item.color}"/>`;
  a += span+gap;
 });
 return `<div class="donut"><svg viewBox="0 0 220 220">${paths}</svg><div class="donut-center"><b>${total}</b><span>件产出</span></div></div>`;
}

  ${sectionHead("团队产出分析")}
  <div class="analysis-grid">
    <div class="analysis-card"><div class="analysis-label">目前热区</div><div class="analysis-main">日报汇整、提醒工具、客服辅助</div><div class="analysis-desc">团队产出集中在高频、重复、可标准化流程，落地价值较高。</div></div>
    <div class="analysis-card"><div class="analysis-label">实际帮助</div><div class="analysis-main">减少重复整理、降低漏看风险、统一输出格式</div><div class="analysis-desc">已上线项目主要改善日报整理、后台提醒、班表查询与客服回复等日常痛点。</div></div>
    <div class="analysis-card"><div class="analysis-label">注意风险</div><div class="analysis-main">资料来源不稳定、格式需人工确认</div><div class="analysis-desc">部分流程仍依赖表格格式、后台页面与人工判断，适合作为半自动辅助工具。</div></div>
  </div>
  ${sectionHead("代表成果")}
  <div class="card result-list">${reps}</div>
 `;
}
function renderAttendance(){
 const data=selectedSchedule(todayDate);
 const filters=["全部","早班","中班","晚班"].map(f=>`<button class="seg-btn ${shiftFilter===f?'active':''}" data-filter="${f}">${f}</button>`).join('');
 let body='';
 if(!data) body=`<div class="card empty">今日暂无出缺勤资料</div>`;
 else {
   const shifts = shiftFilter==="全部" ? shiftOrder : [shiftFilter];
   body=`<div class="att-grid">` + shifts.map(sh=>{
    const st=shiftStats(data,sh), people=data[sh]||[];
    const work=people.filter(p=>p.status==="上班"), off=people.filter(p=>p.status!=="上班");
    return `<div class="card att-card">
      <div class="att-head"><div class="att-title">${sh}</div><div class="att-count">${st.work}人上班 / 共${st.total}人</div></div>
      <div class="att-group-title">上班</div>${work.map(personRow).join('') || '<div class="empty" style="padding:10px">无</div>'}
      <div class="att-group-title">休假 / 其他</div>${off.map(personRow).join('') || '<div class="empty" style="padding:10px">无</div>'}
    </div>`;
   }).join('') + `</div>`;
 }
 document.getElementById("page-attendance").innerHTML = `
  ${sectionHead("出缺勤","当前日期：" + zhDateWeek(todayDate))}
  <div class="segment">${filters}</div>
  ${body}
 `;
 document.querySelectorAll("[data-filter]").forEach(btn=>btn.onclick=()=>{shiftFilter=btn.dataset.filter;renderAttendance();});
}
function personRow(p){
 return `<div class="person-row"><div class="person-left"><div class="avatar">${p.name[0]}</div><div><div class="person-name">${p.name}</div><div class="result-desc">${p.raw}</div></div></div><span class="status ${statusClass(p.status)}">${shortStatus(p)}</span></div>`;
}
function renderCalendar(){
 const calDate = parseDate(calendarSelectedDate);
 calendarYear = calendarYear ?? calDate.getFullYear();
 calendarMonth = calendarMonth ?? calDate.getMonth();
 const data=selectedSchedule(calendarSelectedDate);
 document.getElementById("page-calendar").innerHTML = `
  <div class="cal-layout">
    <div class="card cal-card">
      <div class="cal-head"><button class="small-btn" id="prevMonth">‹</button><div><div class="cal-title">${calendarYear}年${calendarMonth+1}月</div><div class="section-meta">目前显示：${zhDate(calendarSelectedDate)}</div></div><button class="small-btn" id="nextMonth">›</button></div>
      <div class="week-row">${["日","一","二","三","四","五","六"].map(w=>`<div class="week">${w}</div>`).join('')}</div>
      <div class="day-grid">${calendarDays(calendarYear, calendarMonth)}</div>
    </div>
    <div class="card side-card">
      <div class="side-head"><div class="section-title">${parseDate(calendarSelectedDate).getMonth()+1}月${parseDate(calendarSelectedDate).getDate()}日名单</div><button class="filter-link" id="calendarFilter">按班别</button></div>
      <div class="segment" id="calendarSeg" style="display:none">${["全部","早班","中班","晚班"].map(f=>`<button class="seg-btn ${shiftFilter===f?'active':''}" data-cal-filter="${f}">${f}</button>`).join('')}</div>
      ${renderCalendarRoster(data)}
    </div>
  </div>
 `;
 document.getElementById("prevMonth").onclick=()=>{calendarMonth--; if(calendarMonth<0){calendarMonth=11;calendarYear--;} renderCalendar();};
 document.getElementById("nextMonth").onclick=()=>{calendarMonth++; if(calendarMonth>11){calendarMonth=0;calendarYear++;} renderCalendar();};
 document.querySelectorAll(".day:not(.other)").forEach(day=>day.onclick=()=>{
   calendarSelectedDate=day.dataset.date;
   renderCalendar();
});
 document.getElementById("calendarFilter").onclick=()=>{const seg=document.getElementById("calendarSeg"); seg.style.display=seg.style.display==="none"?"flex":"none";};
 document.querySelectorAll("[data-cal-filter]").forEach(btn=>btn.onclick=()=>{shiftFilter=btn.dataset.calFilter; renderCalendar(); document.getElementById("calendarSeg").style.display="flex";});
}
function calendarDays(y,m){
 const first = new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
 let out='';
 for(let i=0;i<first;i++) out += `<button class="day other">${prevDim-first+i+1}</button>`;
 for(let d=1;d<=dim;d++){
   const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
   const has = APP_DATA.schedule[iso] ? "has" : "";
   const selected = iso===calendarSelectedDate ? "selected" : "";
   out += `<button class="day ${has} ${selected}" data-date="${iso}">${d}</button>`;
 }
 const rem=(first+dim)%7===0?0:7-(first+dim)%7;
 for(let i=1;i<=rem;i++) out += `<button class="day other">${i}</button>`;
 return out;
}
function renderCalendarRoster(data){
 if(!data) return `<div class="empty">此日期暂无班表资料</div>`;
 const shifts = shiftFilter==="全部" ? shiftOrder : [shiftFilter];
 return `<div class="roster-card" style="border:0;box-shadow:none">` + shifts.map(sh=>{
   const people = data[sh] || [];
   const cls=shiftClass[sh];
   return `<div class="roster-block ${cls}" style="padding-left:0;padding-right:0"><div class="roster-top"><div class="roster-title">${iconSun(sh)} <span>${sh}</span></div><div class="roster-total">共${people.length}人</div></div><div class="chips">${people.map(p=>`<span class="person-chip">${p.name} <span class="status ${statusClass(p.status)}">${shortStatus(p)}</span></span>`).join('')}</div></div>`;
 }).join('') + `</div>`;
}
function renderMe(){
 document.getElementById("page-me").innerHTML = `
  ${sectionHead("我的","网页版内部 App / PWA 原型")}
  <div class="card result-list">
    <div class="result-row"><div class="num">1</div><div><div class="result-title">台达客服部｜内部协作台</div><div class="result-desc">整合 AI 产出、出缺勤与班表查询的内部协作原型。</div></div></div>
    <div class="result-row"><div class="num">2</div><div><div class="result-title">手机与电脑通用</div><div class="result-desc">支援 iOS Safari、Android Chrome 与电脑浏览器开启。</div></div></div>
    <div class="result-row"><div class="num">3</div><div><div class="result-title">可加到手机桌面</div><div class="result-desc">正式部署到 HTTPS 后，可加入主画面，作为 PWA 使用。</div></div></div>
  </div>
  <div class="footer-note">目前为展示原型，资料来自上传的班表与 AI 产出表整理。后续可继续接 Google Sheet 或后台 API。</div>
 `;
}
function renderAll(resetCalendar=true){
 if(resetCalendar){
   todayDate = localISODate(new Date());
   if(calendarSelectedDate === undefined || !calendarSelectedDate) calendarSelectedDate = todayDate;
   const d=parseDate(calendarSelectedDate); calendarYear=d.getFullYear(); calendarMonth=d.getMonth();
 }
 renderHome(); renderAI(); renderAttendance(); renderCalendar(); renderMe();
}
function switchPage(p){
 activePage=p;
 if(p !== "calendar"){
   todayDate = localISODate(new Date());
 }
 document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
 document.getElementById("page-"+p).classList.add("active");
 document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.page===p));
 document.getElementById("content").scrollTop=0;
 if(p==="home") renderHome();
 if(p==="calendar") renderCalendar();
 if(p==="attendance") renderAttendance();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchPage(t.dataset.page));

function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModals(){ document.querySelectorAll(".modal-mask").forEach(m=>m.classList.remove("open")); }
document.querySelectorAll("[data-close], .modal-mask").forEach(el=>el.addEventListener("click",e=>{ if(e.target===el || e.target.hasAttribute("data-close")) closeModals(); }));
document.getElementById("searchBtn").onclick=()=>{openModal("searchModal"); document.getElementById("searchInput").focus(); runSearch("");};
document.getElementById("notifyBtn").onclick=()=>{renderNotifications(); openModal("notifyModal");};
document.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>{document.getElementById("searchInput").value=b.dataset.q; runSearch(b.dataset.q);});
document.getElementById("searchInput").addEventListener("input", e=>runSearch(e.target.value));

function runSearch(q){
 const res=document.getElementById("searchResults");
 const query=(q||"").trim().toLowerCase();
 let items=[];
 if(!query) items=[
  ["今日出缺勤", "查看今日早中晚班上班与休假情况", "attendance"],
  ["AI产出", "查看团队 AI 成果总览与风险分析", "ai"],
  ["今日班表", "打开当日班表与名单", "calendar"],
 ];
 else {
   if("今日出缺勤".includes(q)||"出缺勤".includes(q)) items.push(["今日出缺勤", zhDate(todayDate), "attendance"]);
   if("AI产出日报提醒风险".toLowerCase().includes(query) || query.includes("ai")) items.push(["AI产出分析", "团队成果、热区、实际帮助与注意风险", "ai"]);
   const data=selectedSchedule(todayDate);
   shiftOrder.forEach(sh=>(data?.[sh]||[]).forEach(p=>{
     if(p.name.toLowerCase().includes(query) || (query && p.raw.toLowerCase().includes(query))) items.push([p.name, `${zhDate(todayDate)}｜${sh}｜${p.raw}`, "attendance"]);
   }));
   if(query.includes("/")||query.includes("月")||query.includes("班表")||query.includes("晚班")) items.push(["班表查询", "切换日期或按班别查看名单", "calendar"]);
 }
 if(!items.length) items=[["没有找到结果","可试试人名、日期、日报、提醒、班表等关键字",""]];
 res.innerHTML = items.map(it=>`<button class="search-item" data-open="${it[2]}"><b>${it[0]}</b><p>${it[1]}</p></button>`).join('');
 document.querySelectorAll("[data-open]").forEach(btn=>btn.onclick=()=>{const p=btn.dataset.open;if(p){closeModals();switchPage(p);}});
}
function renderNotifications(){
 const data=selectedSchedule(todayDate), c=countDay(data), night=data?shiftStats(data,"晚班"):null;
 const list = [
  ["今日提醒", data?`今日上班 ${c.work} 人、休假 ${c.off} 人。`:"今日暂无班表资料，请确认资料是否已建立。"],
  ["班表提醒", data?`首页与出缺勤固定显示今日 ${zhDateWeek(todayDate)}；班表页可独立切换其他日期。`:"当前日期没有可显示名单。"],
  ["AI产出提醒", `团队产出 ${APP_DATA.ai.total} 件，已上线 ${APP_DATA.ai.online} 件，建议持续关注资料来源与格式稳定性。`],
  ["系统提醒", "搜寻、通知、日期切换与班别筛选已启用。"]
 ];
 document.getElementById("notifyList").innerHTML=list.map(x=>`<div class="search-item"><b>${x[0]}</b><p>${x[1]}</p></div>`).join('');
}
function toast(msg){
 const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800);
}
setInterval(()=>{ if(activePage==="home") renderHome(); }, 30000);

// Default = current system date; if no uploaded schedule contains it, still shows date with empty state.
renderAll(true);
</script>
